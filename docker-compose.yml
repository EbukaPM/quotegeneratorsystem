services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: safebox-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - DB_DIR=/data
    volumes:
      - safebox-db:/data
    expose:
      - "4000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: safebox-frontend
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - backend

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: safebox-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend

volumes:
  safebox-db:
