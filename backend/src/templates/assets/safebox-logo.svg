<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Outer star points (top, bottom, left, right) -->
  <polygon points="100,4 118,40 82,40" fill="#000"/>
  <polygon points="100,196 118,160 82,160" fill="#000"/>
  <polygon points="4,100 40,82 40,118" fill="#000"/>
  <polygon points="196,100 160,82 160,118" fill="#000"/>

  <!-- Rotated square (diamond) body -->
  <rect x="46" y="46" width="108" height="108" transform="rotate(45 100 100)" fill="#000"/>

  <!-- White octagon cut-out -->
  <polygon points="100,58 142,100 100,142 58,100" fill="#fff"/>

  <!-- Left / right arrow accents -->
  <g stroke="#000" stroke-width="3" fill="none">
    <line x1="14" y1="100" x2="56" y2="100"/>
    <polyline points="24,92 14,100 24,108"/>
    <line x1="144" y1="100" x2="186" y2="100"/>
    <polyline points="176,92 186,100 176,108"/>
  </g>

  <!-- Wordmark -->
  <text x="100" y="98" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="19" fill="#8DC63F" letter-spacing="0.5">SAFEBOX</text>
  <text x="100" y="112" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="600" font-size="8" fill="#555" letter-spacing="3">ENERGY</text>
</svg>
