services:
  backend:
    image: node:20-alpine
    container_name: safebox-backend-dev
    working_dir: /app
    command: sh -c "apk add --no-cache chromium nss freetype harfbuzz ca-certificates ttf-freefont python3 make g++ && npm install && npm run dev"
    env_file:
      - ./backend/.env
    environment:
      - DB_DIR=/data
      - NODE_ENV=development
      - PUPPETEER_SKIP_DOWNLOAD=true
      - PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium-browser
    volumes:
      - ./backend:/app
      - safebox-db-dev:/data
      - backend-node-modules:/app/node_modules
    ports:
      - "4000:4000"

  frontend:
    image: node:20-alpine
    container_name: safebox-frontend-dev
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    environment:
      - VITE_API_PROXY_TARGET=http://backend:4000
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  safebox-db-dev:
  backend-node-modules:
  frontend-node-modules:
